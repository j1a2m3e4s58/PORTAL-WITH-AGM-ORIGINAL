services:
  - type: web
    name: bawjiase-staff-api-f018
    runtime: python
    plan: free
    rootDir: src/mail-api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: PORTAL_PUBLIC_URL
        sync: false

  - type: web
    name: agm-pro-backend
    runtime: node
    rootDir: connected-sites/agm-pro-main
    buildCommand: npx pnpm@10.11.1 install --frozen-lockfile && npx pnpm@10.11.1 build:shared-backend
    startCommand: npx pnpm@10.11.1 shared:backend
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: AGM_SHARED_STATE_FILE
        value: /opt/render/project/src/connected-sites/agm-pro-main/data/agm-shared-backend-state.json
      - key: AGM_SHARED_BACKUP_DIR
        value: /opt/render/project/src/connected-sites/agm-pro-main/data/agm-shared-backups

  - type: web
    name: bawjiase-staff-preview-f018
    runtime: static
    rootDir: src/frontend
    buildCommand: npx pnpm@10.11.1 install --frozen-lockfile && npx pnpm@10.11.1 build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_MAIL_API_URL
        value: https://bawjiase-staff-api-f018.onrender.com/api
      - key: HUSKY
        value: "0"
      - key: NPM_CONFIG_IGNORE_SCRIPTS
        value: "true"
    routes:
      - type: rewrite
        source: /mail-api/*
        destination: https://bawjiase-staff-api-f018.onrender.com/*
      - type: rewrite
        source: /connected-sites/agm/*
        destination: /connected-sites/agm/index.html
      - type: rewrite
        source: /*
        destination: /index.html
